name: Build index

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check index is up to date
        run: |
          python scripts/build_index.py --check
